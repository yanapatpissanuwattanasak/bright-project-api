services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-bright_portfolio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-bright_portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-bright_portfolio}
      RESEND_API_KEY: ${RESEND_API_KEY}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      RPS_WS_CORS_ORIGIN: ${RPS_WS_CORS_ORIGIN:-http://localhost:5173}
      PORT: ${PORT:-3000}
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build:
      context: .
      target: migrate
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-bright_portfolio}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
